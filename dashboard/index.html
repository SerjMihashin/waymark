<!doctype html>
<html lang="ru" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Waymark — тропа агентов</title>
  <!-- Tailwind vendored locally (no external CDN): offline-capable, no SRI/CDN-compromise risk. -->
  <script src="./vendor/tailwind.js"></script>
  <style>
    :root {
      --bg: #0E1013; --panel: #14171C; --raised: #191E25; --line: #262B33;
      --ink: #D8D4CC; --muted: #8A8F96; --blaze: #E8833A;
      --moss: #8FB573; --amber: #D9A441; --rust: #C4564A; --blue: #7A93B8;
    }
    body { background: var(--bg); color: var(--ink); }
    .mono { font-family: ui-monospace, 'Cascadia Code', Consolas, 'Courier New', monospace; }
    .eyebrow { font-family: ui-monospace, Consolas, monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
    .card { background: var(--panel); border: 1px solid var(--line); }
    .raised { background: var(--raised); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #232830; border-radius: 6px; }

    /* Trail: the signature element. A route line with waymark nodes. */
    .trail { position: relative; padding-left: 28px; }
    .trail::before { content: ''; position: absolute; left: 9px; top: 6px; bottom: 6px; width: 2px;
      background: repeating-linear-gradient(to bottom, var(--line) 0 6px, transparent 6px 11px); }
    .trail-node { position: relative; }
    .trail-node::before { content: ''; position: absolute; left: -25px; top: 14px; width: 10px; height: 10px;
      border-radius: 9999px; background: var(--bg); border: 2px solid var(--dot, var(--muted)); }
    /* A handoff is a blaze: the painted diamond that marks the trail. */
    .blaze-diamond { display: inline-block; width: 11px; height: 11px; background: var(--blaze);
      transform: rotate(45deg); flex: none; }
    .trail-node.handoff::before { border-radius: 0; transform: rotate(45deg); background: var(--blaze); border-color: var(--blaze); }

    .pulse { animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
    @media (prefers-reduced-motion: reduce) { .pulse { animation: none } }

    button:focus-visible, select:focus-visible, input:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid var(--blaze); outline-offset: 1px; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="font-sans text-[15px]">
  <div class="min-h-screen flex flex-col">
    <header class="border-b px-5 py-3 flex items-center justify-between sticky top-0 z-10 gap-3 flex-wrap"
            style="border-color: var(--line); background: var(--bg);">
      <div class="flex items-center gap-3 min-w-0">
        <span class="blaze-diamond" aria-hidden="true"></span>
        <h1 class="mono font-bold tracking-[.22em] text-base">WAYMARK</h1>
        <span class="eyebrow hidden sm:inline" id="dbPath">тропа агентов</span>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <span id="adminBadge" class="hidden eyebrow px-2 py-1 rounded border" style="color: var(--amber); border-color: var(--amber);">admin</span>
        <span class="flex items-center gap-1.5 eyebrow" title="Автообновление: панель следит за изменениями БД">
          <span id="liveDot" class="w-2 h-2 rounded-full pulse" style="background: var(--moss)"></span>
          <span id="liveLabel">live</span>
        </span>
        <select id="projectFilter" aria-label="Фильтр по проекту"
                class="raised border rounded-lg px-3 py-1.5 text-sm max-w-[220px]" style="border-color: var(--line);">
          <option value="">Все проекты</option>
        </select>
        <span id="trStatus" class="text-xs" style="color: var(--muted)"></span>
        <button id="trToggle" title="Перевод содержимого на русский (машинный, кэшируется)"
                class="text-xs px-3 py-1.5 rounded-lg border transition" style="border-color: var(--line); color: var(--muted);">RU</button>
      </div>
    </header>

    <div class="flex flex-1 min-h-0">
      <nav class="w-44 border-r p-3 space-y-1 shrink-0 hidden md:block" id="nav" style="border-color: var(--line);"></nav>
      <nav class="md:hidden w-full border-b p-2 flex gap-1 overflow-x-auto fixed bottom-0 z-10" id="navMobile"
           style="border-color: var(--line); background: var(--bg);"></nav>
      <main class="flex-1 overflow-auto p-6 pb-20 md:pb-6" id="content">
        <div style="color: var(--muted)">Загрузка…</div>
      </main>
    </div>
  </div>

  <script>
    const TABS = [
      { id: 'overview', label: 'Обзор' },
      { id: 'trail',    label: 'Тропа' },
      { id: 'tasks',    label: 'Задачи' },
      { id: 'memory',   label: 'Память' },
      { id: 'sessions', label: 'Сессии' },
      { id: 'agents',   label: 'Агенты' },
      { id: 'experiments', label: 'Бенчмарки' },
    ];
    let current = 'trail';
    let projectId = '';
    let memQuery = '';
    let memType = '';
    let memStatus = 'active';
    let isAdmin = false;

    const el = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; };
    const esc = (s) => (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    async function api(p, opts) { const r = await fetch(p, opts); if (!r.ok) throw new Error((await r.json().catch(() => null))?.error || await r.text()); return r.json(); }
    const pq = () => projectId ? `?project_id=${encodeURIComponent(projectId)}` : '';

    const OUTCOME = { completed: 'var(--moss)', partial: 'var(--amber)', blocked: 'var(--rust)' };
    const STATUS_RU = {
      pending: 'в очереди', in_progress: 'в работе', done: 'готово', cancelled: 'отменено',
      active: 'активна', paused: 'пауза', archived: 'архив', superseded: 'заменена',
      stale: 'устарела', completed: 'завершена', blocked: 'блок', retired: 'выведен',
    };
    const statusColor = (s) => ({
      active: 'var(--moss)', done: 'var(--moss)', completed: 'var(--moss)',
      pending: 'var(--amber)', in_progress: 'var(--blaze)', paused: 'var(--muted)',
      archived: 'var(--muted)', superseded: 'var(--muted)', stale: 'var(--amber)',
      blocked: 'var(--rust)', cancelled: 'var(--muted)',
    }[s] || 'var(--muted)');

    function relTime(s) {
      if (!s) return '—';
      const d = new Date(s.replace(' ', 'T') + (String(s).includes('Z') || String(s).includes('+') ? '' : 'Z'));
      const diff = (Date.now() - d.getTime()) / 1000;
      if (!Number.isFinite(diff)) return '—';
      if (diff < 90) return 'только что';
      if (diff < 5400) return `${Math.round(diff / 60)} мин назад`;
      if (diff < 129600) return `${Math.round(diff / 3600)} ч назад`;
      if (diff < 12 * 86400) return `${Math.round(diff / 86400)} дн назад`;
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }
    const fmtDate = (s) => s ? new Date(s.replace(' ', 'T') + (String(s).includes('Z') || String(s).includes('+') ? '' : 'Z')).toLocaleString('ru-RU', { dateStyle: 'short', timeStyle: 'short' }) : '—';

    const initials = (name) => (name || '??').split(/[\s(-]+/).filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
    const avatar = (name, color) => `
      <span class="mono inline-flex items-center justify-center w-7 h-7 rounded-full border text-[11px] shrink-0"
            style="border-color:${color || 'var(--line)'}; color:${color || 'var(--muted)'}" title="${esc(name || 'без имени')}">${esc(initials(name))}</span>`;
    const chip = (text, color) => `<span class="mono text-[11px] px-2 py-0.5 rounded-full border" style="border-color:${color};color:${color}">${esc(text)}</span>`;

    function title(t, sub) { return `<div class="mb-5"><div class="eyebrow mb-1">waymark / ${esc(current)}</div><h2 class="text-xl font-semibold">${esc(t)}</h2>${sub ? `<p class="text-sm mt-0.5" style="color:var(--muted)">${esc(sub)}</p>` : ''}</div>`; }
    function empty(t, hint) { return `<div class="card rounded-xl p-10 text-center"><div style="color:var(--muted)">${esc(t)}</div>${hint ? `<div class="text-xs mt-2" style="color:var(--muted)">${esc(hint)}</div>` : ''}</div>`; }

    function renderNav() {
      for (const navEl of [document.getElementById('nav'), document.getElementById('navMobile')]) {
        navEl.innerHTML = '';
        for (const t of TABS) {
          const active = t.id === current;
          navEl.appendChild(el(`
            <button data-tab="${t.id}" class="text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 transition w-full md:w-auto whitespace-nowrap"
              style="${active ? 'background:var(--raised);color:var(--ink);border:1px solid var(--line)' : 'color:var(--muted);border:1px solid transparent'}">
              <span class="inline-block w-2 h-2 ${t.id === 'trail' ? '' : 'rounded-full'}"
                    style="background:${active ? 'var(--blaze)' : 'var(--line)'};${t.id === 'trail' ? 'transform:rotate(45deg)' : ''}"></span>
              ${t.label}
            </button>`));
        }
        navEl.querySelectorAll('button').forEach(b => b.onclick = () => { current = b.dataset.tab; renderNav(); route(); });
      }
    }

    async function route() {
      const c = document.getElementById('content');
      c.innerHTML = '<div style="color:var(--muted)">Загрузка…</div>';
      try {
        const r = {
          overview: renderOverview, trail: renderTrail, tasks: renderTasks,
          memory: renderMemory, sessions: renderSessions, agents: renderAgents,
          experiments: renderExperiments,
        }[current];
        if (r) await r(c);
        await translateSection();
      } catch (e) {
        c.innerHTML = `<div class="card rounded-xl p-6" style="color:var(--rust)">Не удалось загрузить данные: ${esc(e.message)}. Проверьте, что хаб-БД доступна, и обновите страницу.</div>`;
      }
    }

    // ---- Обзор ---------------------------------------------------------------
    async function renderOverview(c) {
      const [ov, trail] = await Promise.all([api('/api/overview'), api('/api/trail' + pq())]);
      const tiles = Object.entries({ 'проекты': ov.counts.projects, 'задачи': ov.counts.tasks, 'память': ov.counts.memory, 'сессии': ov.counts.sessions, 'агенты': ov.counts.agents, 'бенчмарки': ov.counts.experiments })
        .map(([k, v]) => `<div class="card rounded-xl p-4"><div class="mono num text-2xl">${v}</div><div class="eyebrow mt-1">${k}</div></div>`).join('');
      const byStatus = ov.tasks_by_status.map(r => `
        <div class="flex items-center gap-3 py-1.5">
          <span class="w-24 text-sm" style="color:var(--muted)">${esc(STATUS_RU[r.status] || r.status)}</span>
          <div class="flex-1 h-1.5 rounded-full overflow-hidden" style="background:var(--raised)">
            <div class="h-full rounded-full" style="width:${Math.min(100, r.c / Math.max(1, ov.counts.tasks) * 100)}%;background:${statusColor(r.status)}"></div>
          </div>
          <span class="mono num text-sm w-8 text-right">${r.c}</span>
        </div>`).join('');
      const activeHandoffs = trail.handoffs.filter(h => h.status === 'active');
      c.innerHTML = `
        ${title('Обзор', 'Состояние общего хаба памяти')}
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">${tiles}</div>
        <div class="grid lg:grid-cols-2 gap-4">
          <div class="card rounded-xl p-5">
            <div class="eyebrow mb-3">задачи по статусам</div>
            ${byStatus || '<div style="color:var(--muted)" class="text-sm">Задач пока нет</div>'}
          </div>
          <div class="card rounded-xl p-5">
            <div class="eyebrow mb-3">активные передачи</div>
            ${activeHandoffs.length ? activeHandoffs.map(h => `
              <div class="flex items-start gap-3 py-2">
                <span class="blaze-diamond mt-1.5"></span>
                <div class="min-w-0">
                  <div class="text-sm truncate" data-tr>${esc(h.description || h.name)}</div>
                  <div class="eyebrow mt-0.5">${esc(h.project_name || 'глобально')} · ${relTime(h.updated_at)}</div>
                </div>
              </div>`).join('') : '<div class="text-sm" style="color:var(--muted)">Открытых передач нет — все тропы пройдены до конца.</div>'}
          </div>
        </div>`;
    }

    // ---- Тропа (signature) ----------------------------------------------------
    async function renderTrail(c) {
      const t = await api('/api/trail' + pq());
      const active = t.handoffs.find(h => h.status === 'active');
      const handoffBySession = new Map(t.handoffs.map(h => [h.origin_session, h]));
      const pinned = active ? `
        <div class="card rounded-xl p-5 mb-6" style="border-left: 3px solid var(--blaze)">
          <div class="flex items-center gap-2 mb-2">
            <span class="blaze-diamond"></span>
            <span class="eyebrow" style="color:var(--blaze)">эстафета ждёт — продолжить отсюда</span>
          </div>
          <div class="text-sm mb-2" data-tr>${esc(active.description || '')}</div>
          <pre class="mono text-[12.5px] whitespace-pre-wrap leading-relaxed p-3 rounded-lg raised" data-tr>${esc(active.body || '')}</pre>
          <div class="eyebrow mt-2">${esc(active.agent_name || active.created_by_agent || 'агент не назван')} · ${relTime(active.updated_at)}${isAdmin ? ` · <button class="underline" style="color:var(--muted)" onclick="adminMemory('${esc(active.id)}','archived')">погасить</button>` : ''}</div>
        </div>` : '';
      const nodes = t.sessions.map(s => {
        const color = OUTCOME[s.outcome] || 'var(--muted)';
        const h = handoffBySession.get(s.id);
        return `
        <div class="trail-node pb-5 ${h ? 'handoff' : ''}" style="--dot:${color}">
          <div class="card rounded-xl p-4">
            <div class="flex items-center gap-2.5 flex-wrap">
              ${avatar(s.agent_name || s.agent_id || s.client, color)}
              <span class="text-sm font-medium">${esc(s.agent_name || s.agent_id || s.client || s.surface)}</span>
              ${chip(STATUS_RU[s.outcome] || s.outcome || '—', color)}
              ${!projectId && s.project_name ? chip(s.project_name, 'var(--blue)') : ''}
              <span class="eyebrow ml-auto" title="${esc(fmtDate(s.ended_at || s.started_at))}">${relTime(s.ended_at || s.started_at)}</span>
            </div>
            <div class="text-sm mt-2.5 leading-relaxed" data-tr>${esc(s.summary || '')}</div>
            <div class="flex gap-2 mt-2.5 flex-wrap">
              ${s.commits_made.length ? chip(`коммиты: ${s.commits_made.length}`, 'var(--muted)') : ''}
              ${s.files_touched.length ? chip(`файлы: ${s.files_touched.length}`, 'var(--muted)') : ''}
              ${h ? chip(h.status === 'active' ? 'передал эстафету' : 'эстафета принята', h.status === 'active' ? 'var(--blaze)' : 'var(--muted)') : ''}
            </div>
          </div>
        </div>`;
      }).join('');
      c.innerHTML = `
        ${title('Тропа', projectId ? 'Кто прошёл этот маршрут и что оставил следующему' : 'Последние сессии по всем проектам')}
        ${pinned}
        ${t.sessions.length ? `<div class="trail">${nodes}</div>` : empty('На этой тропе ещё нет меток', 'Сессии появятся после первого session_log от любого агента.')}`;
    }

    // ---- Задачи (доска) --------------------------------------------------------
    async function renderTasks(c) {
      const rows = await api('/api/tasks' + pq());
      const COLS = [['pending', 'В очереди'], ['in_progress', 'В работе'], ['done', 'Готово'], ['cancelled', 'Отменено']];
      const cols = COLS.map(([st, label]) => {
        const items = rows.filter(r => r.status === st);
        return `
        <div class="min-w-[260px] flex-1">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-2 h-2 rounded-full" style="background:${statusColor(st)}"></span>
            <span class="eyebrow">${label}</span>
            <span class="mono num text-xs" style="color:var(--muted)">${items.length}</span>
          </div>
          <div class="space-y-3">
            ${items.map(r => `
              <div class="card rounded-xl p-4">
                <div class="text-sm font-medium leading-snug" data-tr>${esc(r.title)}</div>
                ${r.description ? `<div class="text-[13px] mt-1.5 leading-relaxed" style="color:var(--muted)" data-tr>${esc(r.description.slice(0, 220))}${r.description.length > 220 ? '…' : ''}</div>` : ''}
                <div class="flex gap-2 mt-3 flex-wrap items-center">
                  ${!projectId && r.project_name ? chip(r.project_name, 'var(--blue)') : ''}
                  ${r.assigned_to || r.claimed_agent_name ? chip(r.claimed_agent_name || r.assigned_to, 'var(--muted)') : ''}
                  ${r.priority !== 50 ? chip(`p${r.priority}`, r.priority > 50 ? 'var(--amber)' : 'var(--muted)') : ''}
                  ${r.blocker ? chip('блокер', 'var(--rust)') : ''}
                </div>
                ${isAdmin && (st === 'pending' || st === 'in_progress') ? `
                  <div class="flex gap-2 mt-3">
                    ${st === 'pending' ? `<button class="text-xs px-2 py-1 rounded border" style="border-color:var(--line);color:var(--blaze)" onclick="adminTask('${esc(r.id)}','in_progress')">в работу</button>` : ''}
                    <button class="text-xs px-2 py-1 rounded border" style="border-color:var(--line);color:var(--moss)" onclick="adminTask('${esc(r.id)}','done')">готово</button>
                    <button class="text-xs px-2 py-1 rounded border" style="border-color:var(--line);color:var(--muted)" onclick="adminTask('${esc(r.id)}','cancelled')">отменить</button>
                  </div>` : ''}
              </div>`).join('') || `<div class="text-xs px-1" style="color:var(--muted)">пусто</div>`}
          </div>
        </div>`;
      }).join('');
      c.innerHTML = `${title('Задачи', 'Очередь координации: claim забирает задачу атомарно')}<div class="flex gap-4 overflow-x-auto pb-2">${cols}</div>`;
    }

    // ---- Память -----------------------------------------------------------------
    async function renderMemory(c) {
      const params = new URLSearchParams();
      if (projectId) params.set('project_id', projectId);
      if (memQuery) params.set('q', memQuery);
      if (memType) params.set('type', memType);
      if (memStatus) params.set('status', memStatus);
      const rows = await api('/api/memory?' + params);
      const TYPES = ['', 'handoff', 'decision', 'project', 'user', 'feedback', 'reference'];
      c.innerHTML = `
        ${title('Память', 'Общие знания: решения, факты, передачи')}
        <div class="flex gap-2 mb-4 flex-wrap items-center">
          <input id="memSearch" value="${esc(memQuery)}" placeholder="Поиск по памяти…" aria-label="Поиск по памяти"
                 class="raised border rounded-lg px-3 py-1.5 text-sm w-60" style="border-color:var(--line)" />
          ${TYPES.map(t => `<button data-type="${t}" class="text-xs px-2.5 py-1 rounded-full border mono"
              style="border-color:${memType === t ? 'var(--blaze)' : 'var(--line)'};color:${memType === t ? 'var(--blaze)' : 'var(--muted)'}">${t || 'все типы'}</button>`).join('')}
          <select id="memStatus" class="raised border rounded-lg px-2 py-1 text-xs ml-auto" style="border-color:var(--line)" aria-label="Статус записей">
            ${['active', 'superseded', 'stale', 'archived', ''].map(s => `<option value="${s}" ${memStatus === s ? 'selected' : ''}>${s ? (STATUS_RU[s] || s) : 'любой статус'}</option>`).join('')}
          </select>
        </div>
        <div class="space-y-3">
        ${rows.map(r => `
          <details class="card rounded-xl">
            <summary class="p-4 cursor-pointer list-none flex items-center gap-3 flex-wrap">
              ${r.type === 'handoff' ? '<span class="blaze-diamond"></span>' : `<span class="w-2 h-2 rounded-full shrink-0" style="background:${statusColor(r.status)}"></span>`}
              <span class="mono text-[13px]">${esc(r.name)}</span>
              ${chip(r.type, r.type === 'handoff' ? 'var(--blaze)' : 'var(--blue)')}
              ${r.status !== 'active' ? chip(STATUS_RU[r.status] || r.status, 'var(--muted)') : ''}
              <span class="flex-1 text-sm truncate" style="color:var(--muted)" data-tr>${esc(r.description || '')}</span>
              <span class="mono num text-[11px]" style="color:var(--muted)" title="важность / уверенность">${r.importance}/${r.confidence}</span>
              <span class="eyebrow">${relTime(r.updated_at)}</span>
            </summary>
            <div class="px-4 pb-4">
              <pre class="mono text-[12.5px] whitespace-pre-wrap leading-relaxed p-3 rounded-lg raised" data-tr-body>${esc(r.body || '')}</pre>
              <div class="flex gap-2 mt-2 items-center flex-wrap">
                ${(r.tags || []).map(t => chip('#' + t, 'var(--muted)')).join('')}
                <span class="eyebrow ml-auto">${esc(r.created_by_agent || r.surface || '')}</span>
                ${isAdmin && r.status === 'active' ? `<button class="text-xs px-2 py-1 rounded border" style="border-color:var(--line);color:var(--muted)" onclick="adminMemory('${esc(r.id)}','archived')">архивировать</button>` : ''}
              </div>
            </div>
          </details>`).join('') || empty('Ничего не найдено', 'Измените фильтры или поисковый запрос.')}
        </div>`;
      const search = document.getElementById('memSearch');
      let deb;
      search.oninput = () => { clearTimeout(deb); deb = setTimeout(() => { memQuery = search.value.trim(); route(); }, 350); };
      document.getElementById('memStatus').onchange = (e) => { memStatus = e.target.value; route(); };
      c.querySelectorAll('[data-type]').forEach(b => b.onclick = () => { memType = b.dataset.type; route(); });
      c.querySelectorAll('details').forEach(d => d.addEventListener('toggle', () => translateBody(d)));
    }

    // ---- Сессии ------------------------------------------------------------------
    async function renderSessions(c) {
      const rows = await api('/api/sessions' + pq());
      c.innerHTML = `
        ${title('Сессии', 'Журнал: кто работал, что сделал, чем закончил')}
        <div class="space-y-3">
        ${rows.map(s => `
          <div class="card rounded-xl p-4">
            <div class="flex items-center gap-2.5 flex-wrap">
              ${avatar(s.agent_name || s.agent_id || s.client, OUTCOME[s.outcome] || 'var(--muted)')}
              <span class="text-sm font-medium">${esc(s.agent_name || s.agent_id || s.client || s.surface)}</span>
              ${s.model ? chip(s.model, 'var(--muted)') : ''}
              ${chip(STATUS_RU[s.outcome] || s.outcome || '—', OUTCOME[s.outcome] || 'var(--muted)')}
              ${!projectId && s.project_name ? chip(s.project_name, 'var(--blue)') : ''}
              <span class="eyebrow ml-auto" title="${esc(fmtDate(s.started_at))}">${relTime(s.ended_at || s.started_at)}</span>
            </div>
            <div class="text-sm mt-2.5 leading-relaxed" data-tr>${esc(s.summary || '')}</div>
            ${s.commits_made.length ? `<div class="mono text-[11px] mt-2" style="color:var(--muted)">коммиты: ${s.commits_made.map(esc).join(', ')}</div>` : ''}
          </div>`).join('') || empty('Сессий пока нет')}
        </div>`;
    }

    // ---- Агенты --------------------------------------------------------------------
    async function renderAgents(c) {
      const rows = await api('/api/agents');
      c.innerHTML = `
        ${title('Агенты', 'Зарегистрированные участники команды')}
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${rows.map(a => `
          <div class="card rounded-xl p-4">
            <div class="flex items-center gap-3">
              ${avatar(a.display_name, statusColor(a.status))}
              <div class="min-w-0">
                <div class="text-sm font-medium truncate">${esc(a.display_name)}</div>
                <div class="eyebrow mt-0.5">${esc([a.provider, a.model, a.client].filter(Boolean).join(' · '))}</div>
              </div>
              <span class="ml-auto">${chip(STATUS_RU[a.status] || a.status, statusColor(a.status))}</span>
            </div>
            ${(a.capabilities || []).length ? `<div class="flex gap-1.5 mt-3 flex-wrap">${a.capabilities.map(cp => chip(cp, 'var(--muted)')).join('')}</div>` : ''}
          </div>`).join('') || empty('Агенты ещё не регистрировались', 'agent_register доступен в профиле HUB_TOOLS=full.')}
        </div>`;
    }

    // ---- Бенчмарки --------------------------------------------------------------------
    async function renderExperiments(c) {
      const rows = await api('/api/experiments');
      c.innerHTML = `
        ${title('Бенчмарки', 'A/B: сколько токенов экономит хаб')}
        <div class="space-y-3">
        ${rows.map(e => `
          <div class="card rounded-xl p-4 flex items-center gap-3 flex-wrap">
            <span class="mono text-[13px]">${esc(e.name)}</span>
            ${chip(e.scenario, 'var(--blue)')}
            ${chip(STATUS_RU[e.status] || e.status, statusColor(e.status))}
            ${e.project_name ? chip(e.project_name, 'var(--muted)') : ''}
            <span class="text-sm flex-1" style="color:var(--muted)" data-tr>${esc(e.description || '')}</span>
            <span class="eyebrow">${relTime(e.created_at)}</span>
          </div>`).join('') || empty('Экспериментов нет', 'Создайте через npm run benchmark -- create.')}
        </div>`;
    }

    // ---- Admin actions -----------------------------------------------------------
    async function adminTask(id, status) {
      try { await api('/api/admin/task-status', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id, status }) }); route(); }
      catch (e) { alert('Не удалось изменить статус: ' + e.message); }
    }
    async function adminMemory(id, status) {
      try { await api('/api/admin/memory-status', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id, status }) }); route(); }
      catch (e) { alert('Не удалось изменить статус: ' + e.message); }
    }

    // ---- Live refresh --------------------------------------------------------------
    let dataVersion = null;
    async function pollLive() {
      try {
        const s = await api('/api/stats');
        document.getElementById('liveDot').style.background = 'var(--moss)';
        document.getElementById('liveLabel').textContent = 'live';
        if (dataVersion !== null && s.data_version !== dataVersion) route();
        dataVersion = s.data_version;
      } catch {
        document.getElementById('liveDot').style.background = 'var(--rust)';
        document.getElementById('liveLabel').textContent = 'нет связи';
      }
    }
    setInterval(pollLive, 4000);

    // ---- Translation (opt-in, server-cached) ----------------------------------------
    let translateOn = localStorage.getItem('dash_translate') === '1';
    const trCache = new Map();
    const setStatus = (t, color) => {
      const s = document.getElementById('trStatus');
      if (s) { s.textContent = t; s.style.color = color || 'var(--muted)'; }
    };
    async function translateTexts(texts) {
      const need = [...new Set(texts)].filter(t => t && !trCache.has(t));
      if (need.length) {
        setStatus('перевожу…');
        try {
          const r = await fetch('/api/translate', {
            method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ texts: need }),
          });
          if (!r.ok) { setStatus(`сервер ${r.status} — перезапустите npm run dashboard`, 'var(--rust)'); return mapFrom(texts); }
          const data = await r.json();
          for (const [src, tr] of Object.entries(data.translations || {})) trCache.set(src, tr);
          if (data.error === 'no_key') {
            setStatus('нет ключа DeepSeek', 'var(--amber)');
            document.getElementById('trToggle').title = 'Не найден ключ DeepSeek (env DEEPSEEK_API_KEY или ~/.deepseek-code/settings.json)';
          } else if (data.error) {
            setStatus('ошибка перевода: ' + data.error, 'var(--rust)');
          } else {
            setStatus('переведено', 'var(--moss)');
            setTimeout(() => { if (translateOn) setStatus(''); }, 1500);
          }
        } catch {
          setStatus('нет связи с сервером перевода', 'var(--rust)');
        }
      }
      return mapFrom(texts);
    }
    function mapFrom(texts) {
      const map = {};
      for (const t of texts) if (trCache.has(t)) map[t] = trCache.get(t);
      return map;
    }
    async function translateSection() {
      if (!translateOn) return;
      const els = [...document.querySelectorAll('[data-tr]')];
      if (!els.length) return;
      const map = await translateTexts(els.map(e => e.textContent.trim()));
      for (const e of els) { const tr = map[e.textContent.trim()]; if (tr) e.textContent = tr; }
    }
    // Memory bodies are large — translate only when the user expands them.
    async function translateBody(d) {
      if (!translateOn || !d.open) return;
      const pre = d.querySelector('[data-tr-body]');
      if (!pre) return;
      const o = pre.textContent.trim();
      const map = await translateTexts([o]);
      if (map[o]) pre.textContent = map[o];
    }
    function syncTrButton() {
      const b = document.getElementById('trToggle');
      b.style.color = translateOn ? 'var(--blaze)' : 'var(--muted)';
      b.style.borderColor = translateOn ? 'var(--blaze)' : 'var(--line)';
    }

    // ---- Init ------------------------------------------------------------------------
    async function init() {
      renderNav();
      syncTrButton();
      document.getElementById('trToggle').onclick = () => {
        if (!translateOn && !localStorage.getItem('dash_translate_ack')) {
          const ok = confirm(
            'Перевод отправляет тексты памяти, задач и сессий на внешний сервис (api.deepseek.com).\n' +
            'Не включайте, если в хабе есть чувствительные данные. Продолжить?'
          );
          if (!ok) return;
          localStorage.setItem('dash_translate_ack', '1');
        }
        translateOn = !translateOn;
        localStorage.setItem('dash_translate', translateOn ? '1' : '0');
        syncTrButton();
        if (!translateOn) setStatus('');
        route();
      };
      try {
        const caps = await api('/api/capabilities');
        isAdmin = caps.admin;
        if (isAdmin) document.getElementById('adminBadge').classList.remove('hidden');
        document.getElementById('dbPath').textContent = caps.db_path;
      } catch {}
      try {
        const projects = await api('/api/projects');
        const sel = document.getElementById('projectFilter');
        for (const p of projects) sel.appendChild(el(`<option value="${esc(p.id)}">${esc(p.name)}</option>`));
        sel.onchange = () => { projectId = sel.value; route(); };
      } catch {}
      pollLive();
      route();
    }
    init();
  </script>
</body>
</html>
