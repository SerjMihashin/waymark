<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Waymark — agent trail hub</title>
  <!-- Tailwind vendored locally (no external CDN): offline-capable, no SRI/CDN-compromise risk. -->
  <script src="./vendor/tailwind.js"></script>
  <style>
    :root {
      --bg: #0E1013; --panel: #14171C; --raised: #191E25; --line: #262B33;
      --ink: #D8D4CC; --muted: #8A8F96; --blaze: #E8833A;
      --moss: #8FB573; --amber: #D9A441; --rust: #C4564A; --blue: #7A93B8;
    }
    body { background: var(--bg); color: var(--ink); }
    .mono { font-family: ui-monospace, 'Cascadia Code', Consolas, 'Courier New', monospace; }
    .eyebrow { font-family: ui-monospace, Consolas, monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
    .card { background: var(--panel); border: 1px solid var(--line); }
    .raised { background: var(--raised); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #232830; border-radius: 6px; }

    /* Trail: the signature element. A route line with waymark nodes. */
    .trail { position: relative; padding-left: 28px; }
    .trail::before { content: ''; position: absolute; left: 9px; top: 6px; bottom: 6px; width: 2px;
      background: repeating-linear-gradient(to bottom, var(--line) 0 6px, transparent 6px 11px); }
    .trail-node { position: relative; }
    .trail-node::before { content: ''; position: absolute; left: -25px; top: 14px; width: 10px; height: 10px;
      border-radius: 9999px; background: var(--bg); border: 2px solid var(--dot, var(--muted)); }
    /* A handoff is a blaze: the painted diamond that marks the trail. */
    .blaze-diamond { display: inline-block; width: 11px; height: 11px; background: var(--blaze);
      transform: rotate(45deg); flex: none; }
    .trail-node.handoff::before { border-radius: 0; transform: rotate(45deg); background: var(--blaze); border-color: var(--blaze); }

    .card-btn { cursor: pointer; transition: border-color .15s, transform .15s; }
    .card-btn:hover { border-color: var(--blaze); transform: translateY(-1px); }
    .row-btn { cursor: pointer; transition: background .15s; }
    .row-btn:hover { background: var(--raised); }

    .pulse { animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
    @media (prefers-reduced-motion: reduce) { .pulse { animation: none } }

    button:focus-visible, select:focus-visible, input:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid var(--blaze); outline-offset: 1px; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="font-sans text-[15px]">
  <div class="min-h-screen flex flex-col">
    <header class="border-b px-5 py-3 flex items-center justify-between sticky top-0 z-10 gap-3 flex-wrap"
            style="border-color: var(--line); background: var(--bg);">
      <div class="flex items-center gap-3 min-w-0">
        <span class="blaze-diamond" aria-hidden="true"></span>
        <h1 class="mono font-bold tracking-[.22em] text-base">WAYMARK</h1>
        <span class="eyebrow hidden sm:inline" id="dbPath"></span>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <span id="adminBadge" class="hidden eyebrow px-2 py-1 rounded border" style="color: var(--amber); border-color: var(--amber);">admin</span>
        <span class="flex items-center gap-1.5 eyebrow" id="liveWrap">
          <span id="liveDot" class="w-2 h-2 rounded-full pulse" style="background: var(--moss)"></span>
          <span id="liveLabel">live</span>
        </span>
        <select id="projectFilter"
                class="raised border rounded-lg px-3 py-1.5 text-sm max-w-[220px]" style="border-color: var(--line);">
          <option value=""></option>
        </select>
        <span id="trStatus" class="text-xs" style="color: var(--muted)"></span>
        <button id="trToggle"
                class="text-xs px-3 py-1.5 rounded-lg border transition" style="border-color: var(--line); color: var(--muted);">RU</button>
        <button id="langToggle" title="Language"
                class="mono text-xs px-3 py-1.5 rounded-lg border transition" style="border-color: var(--line); color: var(--muted);"></button>
      </div>
    </header>

    <div class="flex flex-1 min-h-0">
      <nav class="w-44 border-r p-3 space-y-1 shrink-0 hidden md:block" id="nav" style="border-color: var(--line);"></nav>
      <nav class="md:hidden w-full border-b p-2 flex gap-1 overflow-x-auto fixed bottom-0 z-10" id="navMobile"
           style="border-color: var(--line); background: var(--bg);"></nav>
      <main class="flex-1 overflow-auto p-6 pb-20 md:pb-6" id="content">
        <div style="color: var(--muted)">Loading…</div>
      </main>
    </div>
  </div>

    const urlParams = new URLSearchParams(location.search);
    let lang = (() => {
      const q = urlParams.get('lang');
      if (T[q]) return q;
      const saved = localStorage.getItem('dash_lang');
      if (T[saved]) return saved;
      return (navigator.language || '').toLowerCase().startsWith('ru') ? 'ru' : 'en';
    })();
    const t = (k) => T[lang][k] ?? T.en[k];

    const TAB_IDS = ['overview', 'trail', 'tasks', 'memory', 'sessions', 'agents', 'experiments'];
    const urlTab = urlParams.get('tab');
    let current = TAB_IDS.includes(urlTab) ? urlTab : 'trail';
    let projectId = '';
    let memQuery = '';
    let memType = '';
    let memStatus = 'active';
    let isAdmin = false;

    const el = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; };
    const esc = (s) => (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    async function api(p, opts) { const r = await fetch(p, opts); if (!r.ok) throw new Error((await r.json().catch(() => null))?.error || await r.text()); return r.json(); }
    const pq = () => projectId ? `?project_id=${encodeURIComponent(projectId)}` : '';

    const OUTCOME = { completed: 'var(--moss)', partial: 'var(--amber)', blocked: 'var(--rust)' };
    const statusLabel = (s) => t('status')[s] || s;
    const statusColor = (s) => ({
      active: 'var(--moss)', done: 'var(--moss)', completed: 'var(--moss)',
      pending: 'var(--amber)', in_progress: 'var(--blaze)', paused: 'var(--muted)',
      archived: 'var(--muted)', superseded: 'var(--muted)', stale: 'var(--amber)',
      blocked: 'var(--rust)', cancelled: 'var(--muted)',
    }[s] || 'var(--muted)');

    function relTime(s) {
      if (!s) return '—';
      const d = new Date(s.replace(' ', 'T') + (String(s).includes('Z') || String(s).includes('+') ? '' : 'Z'));
      const diff = (Date.now() - d.getTime()) / 1000;
      if (!Number.isFinite(diff)) return '—';
      if (diff < 90) return t('just_now');
      if (diff < 5400) return t('min_ago')(Math.round(diff / 60));
      if (diff < 129600) return t('h_ago')(Math.round(diff / 3600));
      if (diff < 12 * 86400) return t('d_ago')(Math.round(diff / 86400));
      return d.toLocaleDateString(t('locale'), { day: 'numeric', month: 'short' });
    }
    const fmtDate = (s) => s ? new Date(s.replace(' ', 'T') + (String(s).includes('Z') || String(s).includes('+') ? '' : 'Z')).toLocaleString(t('locale'), { dateStyle: 'short', timeStyle: 'short' }) : '—';

    // Language-aware plural: RU has three forms, EN uses forms[0] / forms[2].
    function plural(n, forms) {
      if (lang !== 'ru') return n === 1 ? forms[0] : forms[2];
      const m10 = n % 10, m100 = n % 100;
      if (m10 === 1 && m100 !== 11) return forms[0];
      if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return forms[1];
      return forms[2];
    }
    const fmtNum = (n) => (n == null ? '—' : Math.round(n).toLocaleString(t('locale')));

    const initials = (name) => (name || '??').split(/[\s(-]+/).filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
    const avatar = (name, color) => `
      <span class="mono inline-flex items-center justify-center w-7 h-7 rounded-full border text-[11px] shrink-0"
            style="border-color:${color || 'var(--line)'}; color:${color || 'var(--muted)'}" title="${esc(name || t('no_name'))}">${esc(initials(name))}</span>`;
    const chip = (text, color) => `<span class="mono text-[11px] px-2 py-0.5 rounded-full border" style="border-color:${color};color:${color}">${esc(text)}</span>`;

    // Human names for clients/models as logged in sessions — display only,
    // unknown values pass through unchanged.
    const CLIENT_NAMES = { 'claude-code': 'Claude Code', 'codex': 'Codex', 'claude-desktop': 'Claude Desktop', 'cursor': 'Cursor', 'windsurf': 'Windsurf' };
    const prettyClient = (c) => CLIENT_NAMES[c] || c || '';
    function prettyModel(m) {
      if (!m) return '';
      const s = String(m).replace(/^claude-/, '').replace(/-\d{8}$/, '');
      const mm = s.match(/^(opus|sonnet|haiku|fable|mythos)-(\d+)(?:-(\d+))?$/);
      if (mm) return mm[1][0].toUpperCase() + mm[1].slice(1) + ' ' + mm[2] + (mm[3] ? '.' + mm[3] : '');
      return s;
    }
    // Label for who actually worked: client + model as logged in sessions;
    // the registered agent name is only a fallback when neither was logged.
    function agentLabel(a) {
      const parts = [prettyClient(a.client), prettyModel(a.model)].filter(Boolean);
      return parts.join(' · ') || a.display_name || a.provider || t('agent_unnamed');
    }
    const WORK_DOT = { active: 'var(--moss)', paused: 'var(--muted)', idle: 'var(--line)' };
    const WORK_COLOR = { active: 'var(--moss)', paused: 'var(--muted)', idle: 'var(--muted)' };

    function title(tt, sub) { return `<div class="mb-5"><div class="eyebrow mb-1">waymark / ${esc(current)}</div><h2 class="text-xl font-semibold">${esc(tt)}</h2>${sub ? `<p class="text-sm mt-0.5" style="color:var(--muted)">${esc(sub)}</p>` : ''}</div>`; }
    function empty(tt, hint) { return `<div class="card rounded-xl p-10 text-center"><div style="color:var(--muted)">${esc(tt)}</div>${hint ? `<div class="text-xs mt-2" style="color:var(--muted)">${esc(hint)}</div>` : ''}</div>`; }

    function renderNav() {
      for (const navEl of [document.getElementById('nav'), document.getElementById('navMobile')]) {
        navEl.innerHTML = '';
        for (const id of TAB_IDS) {
          const active = id === current;
          navEl.appendChild(el(`
            <button data-tab="${id}" class="text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 transition w-full md:w-auto whitespace-nowrap"
              style="${active ? 'background:var(--raised);color:var(--ink);border:1px solid var(--line)' : 'color:var(--muted);border:1px solid transparent'}">
              <span class="inline-block w-2 h-2 ${id === 'trail' ? '' : 'rounded-full'}"
                    style="background:${active ? 'var(--blaze)' : 'var(--line)'};${id === 'trail' ? 'transform:rotate(45deg)' : ''}"></span>
              ${t('tabs')[id]}
            </button>`));
        }
        navEl.querySelectorAll('button').forEach(b => b.onclick = () => { current = b.dataset.tab; renderNav(); route(); });
      }
    }

    async function route() {
      const c = document.getElementById('content');
      c.innerHTML = `<div style="color:var(--muted)">${t('loading')}</div>`;
      try {
        const r = {
          overview: renderOverview, trail: renderTrail, tasks: renderTasks,
          memory: renderMemory, sessions: renderSessions, agents: renderAgents,
          experiments: renderExperiments,
        }[current];
        if (r) await r(c);
        await translateSection();
      } catch (e) {
        c.innerHTML = `<div class="card rounded-xl p-6" style="color:var(--rust)">${t('load_error')(esc(e.message))}</div>`;
      }
    }

    // ---- Overview ---------------------------------------------------------------
    function openProject(id, tab) {
      projectId = id;
      const sel = document.getElementById('projectFilter');
      if (sel) sel.value = id;
      current = tab || 'trail';
      renderNav();
      route();
    }

    async function renderOverview(c) {
      const [ov, trail] = await Promise.all([api('/api/overview'), api('/api/trail' + pq())]);

      // Clickable stat cards: each leads to its section (projects → table below).
      const CARDS = [
        { n: ov.counts.projects, forms: t('f_project'), go: 'projects' },
        { n: ov.counts.tasks, forms: t('f_task'), go: 'tasks' },
        { n: ov.counts.memory, forms: t('f_memory'), go: 'memory' },
        { n: ov.counts.sessions, forms: t('f_session'), go: 'sessions' },
        { n: ov.counts.agents, forms: t('f_agent'), go: 'agents' },
        { n: ov.counts.experiments, forms: t('f_experiment'), go: 'experiments' },
      ];
      const tiles = CARDS.map(card => `
        <button data-go="${card.go}" class="card card-btn rounded-xl p-4 text-left" title="${t('open_section')}">
          <div class="mono num text-2xl">${card.n}</div>
          <div class="eyebrow mt-1">${plural(card.n, card.forms)}</div>
        </button>`).join('');

      // Token economy gauge from recorded benchmark runs.
      const tk = ov.tokens;
      const bar = (label, value, max, color) => `
        <div class="flex items-center gap-3 py-1.5">
          <span class="w-32 text-sm shrink-0" style="color:var(--muted)">${label}</span>
          <div class="flex-1 h-4 rounded overflow-hidden" style="background:var(--raised)">
            <div class="h-full rounded" style="width:${Math.max(2, value / max * 100)}%;background:${color}"></div>
          </div>
          <span class="mono num text-sm w-20 text-right">${fmtNum(value)}</span>
        </div>`;
      const pct = lang === 'ru' ? String(tk?.saving_pct ?? '').replace('.', ',') : String(tk?.saving_pct ?? '');
      const tokenPanel = tk ? `
        <div class="card rounded-xl p-5 lg:col-span-2">
          <div class="flex items-baseline gap-3 mb-3 flex-wrap">
            <span class="eyebrow">${t('tokens_head')}</span>
            <span class="eyebrow" style="color:var(--muted)" title="${t('tokens_runs_title')(tk.runs.without_hub, tk.runs.with_hub)}">
              ${tk.measurement === 'exact' ? t('tokens_exact') : t('tokens_estimated')}</span>
          </div>
          <div class="flex items-center gap-6 flex-wrap">
            <div class="flex-1 min-w-[260px]">
              ${bar(t('without_hub'), tk.median.without_hub, tk.median.without_hub, 'var(--rust)')}
              ${bar(t('with_hub'), tk.median.with_hub, tk.median.without_hub, 'var(--moss)')}
            </div>
            <div class="text-right">
              <div class="mono num text-3xl" style="color:var(--moss)">−${pct}%</div>
              <div class="eyebrow mt-1">${t('on_orientation')}</div>
            </div>
          </div>
          <div class="text-sm mt-3 pt-3 border-t" style="border-color:var(--line);color:var(--muted)">
            ${t('saved_line')(fmtNum(tk.saved_per_session), plural(tk.saved_per_session, t('f_token')),
              tk.hub_sessions, plural(tk.hub_sessions, t('f_session')), fmtNum(tk.saved_total_est))}
          </div>
        </div>` : `
        <div class="card rounded-xl p-5 lg:col-span-2">
          <div class="eyebrow mb-2">${t('tokens_empty_head')}</div>
          <div class="text-sm" style="color:var(--muted)">${t('tokens_empty')}</div>
        </div>`;

      const activeHandoffs = trail.handoffs.filter(h => h.status === 'active');
      const handoffPanel = `
        <div class="card rounded-xl p-5">
          <div class="eyebrow mb-3">${t('handoffs_head')}</div>
          ${activeHandoffs.length ? activeHandoffs.map(h => `
            <div class="flex items-start gap-3 py-2 px-2 -mx-2 rounded-lg row-btn" data-open-project="${esc(h.project_id || '')}" title="${t('open_trail')}">
              <span class="blaze-diamond mt-1.5"></span>
              <div class="min-w-0">
                <div class="text-sm truncate" data-tr>${esc(h.description || h.name)}</div>
                <div class="eyebrow mt-0.5">${esc(h.project_name || t('global'))} · ${relTime(h.updated_at)}</div>
              </div>
            </div>`).join('') : `<div class="text-sm" style="color:var(--muted)">${t('handoffs_empty')}</div>`}
        </div>`;

      // Projects drill-down table. Status, activity share, and agents come
      // straight from session logs — a project with no sessions shows none.
      const projRows = ov.projects.map(p => {
        const ws = p.work_status in WORK_DOT ? p.work_status : 'idle';
        const agentBadges = p.agents.slice(0, 3).map(a =>
          `<span class="mono text-[11px] px-1.5 py-0.5 rounded border whitespace-nowrap" style="border-color:var(--line);color:var(--muted)"
                 title="${esc(t('agent_tip')(a.sessions, plural(a.sessions, t('f_session')), relTime(a.last_used)))}">${esc(agentLabel(a))}</span>`).join(' ')
          + (p.agents.length > 3 ? `<span class="text-[11px]" style="color:var(--muted)"> +${p.agents.length - 3}</span>` : '');
        return `
        <tr class="row-btn border-t" style="border-color:var(--line)" data-open-project="${esc(p.id)}" title="${t('open_trail')}">
          <td class="py-2.5 pr-3">
            <div class="flex items-center gap-2 min-w-0">
              <span class="w-2 h-2 rounded-full shrink-0" style="background:${WORK_DOT[ws]}"></span>
              <span class="text-sm font-medium truncate">${esc(p.name)}</span>
              ${p.active_handoffs ? `<span class="mono text-[10px] px-1.5 py-0.5 rounded border whitespace-nowrap" style="border-color:var(--blaze);color:var(--blaze)" title="${esc(t('has_handoff'))}">◆ ${t('handoff_chip')}</span>` : ''}
            </div>
            ${p.stack ? `<div class="eyebrow mt-0.5 truncate max-w-[320px]">${esc(p.stack)}</div>` : ''}
          </td>
          <td class="text-sm px-3 whitespace-nowrap" style="color:${WORK_COLOR[ws]}"
              title="${esc(t('status_tip')(relTime(p.last_activity), ov.activity.active_hours))}">${t('work_status')[ws]}</td>
          <td class="px-3">
            ${p.recent_sessions ? `
            <div class="flex items-center gap-2 whitespace-nowrap" title="${esc(t('share_tip')(p.activity_share, p.recent_sessions, ov.activity.total_sessions, ov.activity.days))}">
              <div class="w-16 h-1.5 rounded-full overflow-hidden shrink-0" style="background:var(--raised)">
                <div class="h-full rounded-full" style="width:${Math.max(4, p.activity_share)}%;background:var(--blaze)"></div>
              </div>
              <span class="mono num text-sm">${p.activity_share}%</span>
              <span class="text-[12px]" style="color:var(--muted)">${p.recent_sessions} ${plural(p.recent_sessions, t('f_session'))}</span>
            </div>` : `<span class="text-sm" style="color:var(--muted)">—</span>`}
          </td>
          <td class="text-sm px-3"><div class="flex items-center gap-1 flex-wrap max-w-[300px]">${agentBadges || '<span style="color:var(--muted)">—</span>'}</div></td>
          <td class="mono num text-sm text-right px-3">${p.sessions}</td>
          <td class="mono num text-sm text-right px-3">${p.memory}</td>
          <td class="mono num text-sm text-right px-3" style="${p.open_tasks ? 'color:var(--amber)' : ''}">${p.open_tasks}</td>
          <td class="text-sm text-right pl-3 whitespace-nowrap" style="color:var(--muted)">${relTime(p.last_activity)}</td>
        </tr>`;
      }).join('');
      const projectsPanel = `
        <div class="card rounded-xl p-5" id="ovProjects">
          <div class="eyebrow mb-3">${t('projects_head')}</div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead><tr class="eyebrow text-left">
                <th class="pb-2 font-normal">${t('th_project')}</th>
                <th class="pb-2 px-3 font-normal">${t('th_status')}</th>
                <th class="pb-2 px-3 font-normal">${t('th_share')}</th>
                <th class="pb-2 px-3 font-normal">${t('th_agents')}</th>
                <th class="pb-2 px-3 font-normal text-right">${t('th_sessions')}</th>
                <th class="pb-2 px-3 font-normal text-right">${t('th_memory')}</th>
                <th class="pb-2 px-3 font-normal text-right">${t('th_tasks')}</th>
                <th class="pb-2 pl-3 font-normal text-right">${t('th_activity')}</th>
              </tr></thead>
              <tbody>${projRows}</tbody>
            </table>
          </div>
          <div class="text-[12px] mt-3 pt-3 border-t leading-relaxed" style="border-color:var(--line);color:var(--muted)">
            ${t('legend')(ov.activity.active_hours, ov.activity.days)}
          </div>
        </div>`;

      const byStatus = ov.tasks_by_status.map(r => `
        <div class="flex items-center gap-3 py-1.5">
          <span class="w-24 text-sm" style="color:var(--muted)">${esc(statusLabel(r.status))}</span>
          <div class="flex-1 h-1.5 rounded-full overflow-hidden" style="background:var(--raised)">
            <div class="h-full rounded-full" style="width:${Math.min(100, r.c / Math.max(1, ov.counts.tasks) * 100)}%;background:${statusColor(r.status)}"></div>
          </div>
          <span class="mono num text-sm w-8 text-right">${r.c}</span>
        </div>`).join('');
      const tasksPanel = `
        <div class="card rounded-xl p-5">
          <div class="eyebrow mb-3">${t('tasks_by_status')}</div>
          ${byStatus || `<div style="color:var(--muted)" class="text-sm">${t('no_tasks')}</div>`}
        </div>`;

      c.innerHTML = `
        ${title(t('ov_title'), t('ov_sub'))}
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-4">${tiles}</div>
        <div class="grid lg:grid-cols-3 gap-4 mb-4">
          ${tokenPanel}
          <div class="space-y-4">
            ${handoffPanel}
            ${tasksPanel}
          </div>
        </div>
        ${projectsPanel}`;

      c.querySelectorAll('[data-go]').forEach(b => b.onclick = () => {
        const go = b.dataset.go;
        if (go === 'projects') document.getElementById('ovProjects').scrollIntoView({ behavior: 'smooth', block: 'start' });
        else { current = go; renderNav(); route(); }
      });
      c.querySelectorAll('[data-open-project]').forEach(r => r.onclick = () => openProject(r.dataset.openProject, 'trail'));
    }

    // ---- Trail (signature) ----------------------------------------------------
    async function renderTrail(c) {
      const tr = await api('/api/trail' + pq());
      const active = tr.handoffs.find(h => h.status === 'active');
      const handoffBySession = new Map(tr.handoffs.map(h => [h.origin_session, h]));
      const pinned = active ? `
        <div class="card rounded-xl p-5 mb-6" style="border-left: 3px solid var(--blaze)">
          <div class="flex items-center gap-2 mb-2">
            <span class="blaze-diamond"></span>
            <span class="eyebrow" style="color:var(--blaze)">${t('handoff_waiting')}</span>
          </div>
          <div class="text-sm mb-2" data-tr>${esc(active.description || '')}</div>
          <pre class="mono text-[12.5px] whitespace-pre-wrap leading-relaxed p-3 rounded-lg raised" data-tr>${esc(active.body || '')}</pre>
          <div class="eyebrow mt-2">${esc(active.agent_name || active.created_by_agent || t('agent_unnamed'))} · ${relTime(active.updated_at)}${isAdmin ? ` · <button class="underline" style="color:var(--muted)" onclick="adminMemory('${esc(active.id)}','archived')">${t('retire')}</button>` : ''}</div>
        </div>` : '';
      const nodes = tr.sessions.map(s => {
        const color = OUTCOME[s.outcome] || 'var(--muted)';
        const h = handoffBySession.get(s.id);
        return `
        <div class="trail-node pb-5 ${h ? 'handoff' : ''}" style="--dot:${color}">
          <div class="card rounded-xl p-4">
            <div class="flex items-center gap-2.5 flex-wrap">
              ${avatar(s.agent_name || s.agent_id || s.client, color)}
              <span class="text-sm font-medium">${esc(s.agent_name || s.agent_id || s.client || s.surface)}</span>
              ${s.model ? chip(prettyModel(s.model), 'var(--muted)') : ''}
              ${chip(statusLabel(s.outcome) || '—', color)}
              ${!projectId && s.project_name ? chip(s.project_name, 'var(--blue)') : ''}
              <span class="eyebrow ml-auto" title="${esc(fmtDate(s.ended_at || s.started_at))}">${relTime(s.ended_at || s.started_at)}</span>
            </div>
            <div class="text-sm mt-2.5 leading-relaxed" data-tr>${esc(s.summary || '')}</div>
            <div class="flex gap-2 mt-2.5 flex-wrap">
              ${s.commits_made.length ? chip(`${t('commits')}: ${s.commits_made.length}`, 'var(--muted)') : ''}
              ${s.files_touched.length ? chip(`${t('files')}: ${s.files_touched.length}`, 'var(--muted)') : ''}
              ${h ? chip(h.status === 'active' ? t('handed_off') : t('handoff_taken'), h.status === 'active' ? 'var(--blaze)' : 'var(--muted)') : ''}
            </div>
          </div>
        </div>`;
      }).join('');
      c.innerHTML = `
        ${title(t('trail_title'), projectId ? t('trail_sub_project') : t('trail_sub_all'))}
        ${pinned}
        ${tr.sessions.length ? `<div class="trail">${nodes}</div>` : empty(t('trail_empty'), t('trail_empty_hint'))}`;
    }

    // ---- Tasks (board) --------------------------------------------------------
    async function renderTasks(c) {
      const rows = await api('/api/tasks' + pq());
      const COLS = [['pending', t('col_pending')], ['in_progress', t('col_in_progress')], ['done', t('col_done')], ['cancelled', t('col_cancelled')]];
      const cols = COLS.map(([st, label]) => {
        const items = rows.filter(r => r.status === st);
        return `
        <div class="min-w-[260px] flex-1">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-2 h-2 rounded-full" style="background:${statusColor(st)}"></span>
            <span class="eyebrow">${label}</span>
            <span class="mono num text-xs" style="color:var(--muted)">${items.length}</span>
          </div>
          <div class="space-y-3">
            ${items.map(r => `
              <div class="card rounded-xl p-4">
                <div class="text-sm font-medium leading-snug" data-tr>${esc(r.title)}</div>
                ${r.description ? `<div class="text-[13px] mt-1.5 leading-relaxed" style="color:var(--muted)" data-tr>${esc(r.description.slice(0, 220))}${r.description.length > 220 ? '…' : ''}</div>` : ''}
                <div class="flex gap-2 mt-3 flex-wrap items-center">
                  ${!projectId && r.project_name ? chip(r.project_name, 'var(--blue)') : ''}
                  ${r.assigned_to || r.claimed_agent_name ? chip(r.claimed_agent_name || r.assigned_to, 'var(--muted)') : ''}
                  ${r.priority !== 50 ? chip(`p${r.priority}`, r.priority > 50 ? 'var(--amber)' : 'var(--muted)') : ''}
                  ${r.blocker ? chip(t('blocker'), 'var(--rust)') : ''}
                </div>
                ${isAdmin && (st === 'pending' || st === 'in_progress') ? `
                  <div class="flex gap-2 mt-3">
                    ${st === 'pending' ? `<button class="text-xs px-2 py-1 rounded border" style="border-color:var(--line);color:var(--blaze)" onclick="adminTask('${esc(r.id)}','in_progress')">${t('to_work')}</button>` : ''}
                    <button class="text-xs px-2 py-1 rounded border" style="border-color:var(--line);color:var(--moss)" onclick="adminTask('${esc(r.id)}','done')">${t('to_done')}</button>
                    <button class="text-xs px-2 py-1 rounded border" style="border-color:var(--line);color:var(--muted)" onclick="adminTask('${esc(r.id)}','cancelled')">${t('to_cancel')}</button>
                  </div>` : ''}
              </div>`).join('') || `<div class="text-xs px-1" style="color:var(--muted)">${t('empty_col')}</div>`}
          </div>
        </div>`;
      }).join('');
      c.innerHTML = `${title(t('tasks_title'), t('tasks_sub'))}<div class="flex gap-4 overflow-x-auto pb-2">${cols}</div>`;
    }

    // ---- Memory -----------------------------------------------------------------
    async function renderMemory(c) {
      const params = new URLSearchParams();
      if (projectId) params.set('project_id', projectId);
      if (memQuery) params.set('q', memQuery);
      if (memType) params.set('type', memType);
      if (memStatus) params.set('status', memStatus);
      const rows = await api('/api/memory?' + params);
      const TYPES = ['', 'handoff', 'decision', 'project', 'user', 'feedback', 'reference'];
      c.innerHTML = `
        ${title(t('memory_title'), t('memory_sub'))}
        <div class="flex gap-2 mb-4 flex-wrap items-center">
          <input id="memSearch" value="${esc(memQuery)}" placeholder="${t('mem_search')}" aria-label="${t('mem_search')}"
                 class="raised border rounded-lg px-3 py-1.5 text-sm w-60" style="border-color:var(--line)" />
          ${TYPES.map(ty => `<button data-type="${ty}" class="text-xs px-2.5 py-1 rounded-full border mono"
              style="border-color:${memType === ty ? 'var(--blaze)' : 'var(--line)'};color:${memType === ty ? 'var(--blaze)' : 'var(--muted)'}">${ty || t('all_types')}</button>`).join('')}
          <select id="memStatus" class="raised border rounded-lg px-2 py-1 text-xs ml-auto" style="border-color:var(--line)" aria-label="status">
            ${['active', 'superseded', 'stale', 'archived', ''].map(s => `<option value="${s}" ${memStatus === s ? 'selected' : ''}>${s ? statusLabel(s) : t('any_status')}</option>`).join('')}
          </select>
        </div>
        <div class="space-y-3">
        ${rows.map(r => `
          <details class="card rounded-xl">
            <summary class="p-4 cursor-pointer list-none flex items-center gap-3 flex-wrap">
              ${r.type === 'handoff' ? '<span class="blaze-diamond"></span>' : `<span class="w-2 h-2 rounded-full shrink-0" style="background:${statusColor(r.status)}"></span>`}
              <span class="mono text-[13px]">${esc(r.name)}</span>
              ${chip(r.type, r.type === 'handoff' ? 'var(--blaze)' : 'var(--blue)')}
              ${r.status !== 'active' ? chip(statusLabel(r.status), 'var(--muted)') : ''}
              <span class="flex-1 text-sm truncate" style="color:var(--muted)" data-tr>${esc(r.description || '')}</span>
              <span class="mono num text-[11px]" style="color:var(--muted)" title="${t('imp_conf')}">${r.importance}/${r.confidence}</span>
              <span class="eyebrow">${relTime(r.updated_at)}</span>
            </summary>
            <div class="px-4 pb-4">
              <pre class="mono text-[12.5px] whitespace-pre-wrap leading-relaxed p-3 rounded-lg raised" data-tr-body>${esc(r.body || '')}</pre>
              <div class="flex gap-2 mt-2 items-center flex-wrap">
                ${(r.tags || []).map(tg => chip('#' + tg, 'var(--muted)')).join('')}
                <span class="eyebrow ml-auto">${esc(r.created_by_agent || r.surface || '')}</span>
                ${isAdmin && r.status === 'active' ? `<button class="text-xs px-2 py-1 rounded border" style="border-color:var(--line);color:var(--muted)" onclick="adminMemory('${esc(r.id)}','archived')">${t('archive')}</button>` : ''}
              </div>
            </div>
          </details>`).join('') || empty(t('mem_empty'), t('mem_empty_hint'))}
        </div>`;
      const search = document.getElementById('memSearch');
      let deb;
      search.oninput = () => { clearTimeout(deb); deb = setTimeout(() => { memQuery = search.value.trim(); route(); }, 350); };
      document.getElementById('memStatus').onchange = (e) => { memStatus = e.target.value; route(); };
      c.querySelectorAll('[data-type]').forEach(b => b.onclick = () => { memType = b.dataset.type; route(); });
      c.querySelectorAll('details').forEach(d => d.addEventListener('toggle', () => translateBody(d)));
    }

    // ---- Sessions ------------------------------------------------------------------
    async function renderSessions(c) {
      const rows = await api('/api/sessions' + pq());
      c.innerHTML = `
        ${title(t('sessions_title'), t('sessions_sub'))}
        <div class="space-y-3">
        ${rows.map(s => `
          <div class="card rounded-xl p-4">
            <div class="flex items-center gap-2.5 flex-wrap">
              ${avatar(s.agent_name || s.agent_id || s.client, OUTCOME[s.outcome] || 'var(--muted)')}
              <span class="text-sm font-medium">${esc(s.agent_name || s.agent_id || s.client || s.surface)}</span>
              ${s.model ? chip(prettyModel(s.model), 'var(--muted)') : ''}
              ${chip(statusLabel(s.outcome) || '—', OUTCOME[s.outcome] || 'var(--muted)')}
              ${!projectId && s.project_name ? chip(s.project_name, 'var(--blue)') : ''}
              <span class="eyebrow ml-auto" title="${esc(fmtDate(s.started_at))}">${relTime(s.ended_at || s.started_at)}</span>
            </div>
            <div class="text-sm mt-2.5 leading-relaxed" data-tr>${esc(s.summary || '')}</div>
            ${s.commits_made.length ? `<div class="mono text-[11px] mt-2" style="color:var(--muted)">${t('commits')}: ${s.commits_made.map(esc).join(', ')}</div>` : ''}
          </div>`).join('') || empty(t('sessions_empty'))}
        </div>`;
    }

    // ---- Agents --------------------------------------------------------------------
    async function renderAgents(c) {
      const rows = await api('/api/agents');
      c.innerHTML = `
        ${title(t('agents_title'), t('agents_sub'))}
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${rows.map(a => `
          <div class="card rounded-xl p-4">
            <div class="flex items-center gap-3">
              ${avatar(a.display_name, statusColor(a.status))}
              <div class="min-w-0">
                <div class="text-sm font-medium truncate">${esc(a.display_name)}</div>
                <div class="eyebrow mt-0.5">${esc([a.provider, a.model, a.client].filter(Boolean).join(' · '))}</div>
              </div>
              <span class="ml-auto">${chip(statusLabel(a.status), statusColor(a.status))}</span>
            </div>
            ${(a.capabilities || []).length ? `<div class="flex gap-1.5 mt-3 flex-wrap">${a.capabilities.map(cp => chip(cp, 'var(--muted)')).join('')}</div>` : ''}
          </div>`).join('') || empty(t('agents_empty'), t('agents_empty_hint'))}
        </div>`;
    }

    // ---- Benchmarks --------------------------------------------------------------------
    async function renderExperiments(c) {
      const rows = await api('/api/experiments');
      c.innerHTML = `
        ${title(t('exp_title'), t('exp_sub'))}
        <div class="space-y-3">
        ${rows.map(e => `
          <div class="card rounded-xl p-4 flex items-center gap-3 flex-wrap">
            <span class="mono text-[13px]">${esc(e.name)}</span>
            ${chip(e.scenario, 'var(--blue)')}
            ${chip(statusLabel(e.status), statusColor(e.status))}
            ${e.project_name ? chip(e.project_name, 'var(--muted)') : ''}
            <span class="text-sm flex-1" style="color:var(--muted)" data-tr>${esc(e.description || '')}</span>
            <span class="eyebrow">${relTime(e.created_at)}</span>
          </div>`).join('') || empty(t('exp_empty'), t('exp_empty_hint'))}
        </div>`;
    }

    // ---- Admin actions -----------------------------------------------------------
    async function adminTask(id, status) {
      try { await api('/api/admin/task-status', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id, status }) }); route(); }
      catch (e) { alert(t('admin_fail') + e.message); }
    }
    async function adminMemory(id, status) {
      try { await api('/api/admin/memory-status', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id, status }) }); route(); }
      catch (e) { alert(t('admin_fail') + e.message); }
    }

    // ---- Live refresh --------------------------------------------------------------
    let dataVersion = null;
    async function pollLive() {
      try {
        const s = await api('/api/stats');
        document.getElementById('liveDot').style.background = 'var(--moss)';
        document.getElementById('liveLabel').textContent = t('live');
        if (dataVersion !== null && s.data_version !== dataVersion) route();
        dataVersion = s.data_version;
      } catch {
        document.getElementById('liveDot').style.background = 'var(--rust)';
        document.getElementById('liveLabel').textContent = t('offline');
      }
    }
    setInterval(pollLive, 4000);

    // ---- Content translation (opt-in, server-cached, RU only) -----------------------
    let translateOn = localStorage.getItem('dash_translate') === '1';
    const trCache = new Map();
    const setStatus = (txt, color) => {
      const s = document.getElementById('trStatus');
      if (s) { s.textContent = txt; s.style.color = color || 'var(--muted)'; }
    };
    async function translateTexts(texts) {
      const need = [...new Set(texts)].filter(x => x && !trCache.has(x));
      if (need.length) {
        setStatus(t('tr_busy'));
        try {
          const r = await fetch('/api/translate', {
            method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ texts: need }),
          });
          if (!r.ok) { setStatus(t('tr_server')(r.status), 'var(--rust)'); return mapFrom(texts); }
          const data = await r.json();
          for (const [src, tr] of Object.entries(data.translations || {})) trCache.set(src, tr);
          if (data.error === 'no_key') {
            setStatus(t('tr_no_key'), 'var(--amber)');
            document.getElementById('trToggle').title = t('tr_no_key_title');
          } else if (data.error) {
            setStatus(t('tr_error') + data.error, 'var(--rust)');
          } else {
            setStatus(t('tr_done'), 'var(--moss)');
            setTimeout(() => { if (translateOn) setStatus(''); }, 1500);
          }
        } catch {
          setStatus(t('tr_offline'), 'var(--rust)');
        }
      }
      return mapFrom(texts);
    }
    function mapFrom(texts) {
      const map = {};
      for (const x of texts) if (trCache.has(x)) map[x] = trCache.get(x);
      return map;
    }
    async function translateSection() {
      if (!translateOn || lang !== 'ru') return;
      const els = [...document.querySelectorAll('[data-tr]')];
      if (!els.length) return;
      const map = await translateTexts(els.map(e => e.textContent.trim()));
      for (const e of els) { const tr = map[e.textContent.trim()]; if (tr) e.textContent = tr; }
    }
    // Memory bodies are large — translate only when the user expands them.
    async function translateBody(d) {
      if (!translateOn || lang !== 'ru' || !d.open) return;
      const pre = d.querySelector('[data-tr-body]');
      if (!pre) return;
      const o = pre.textContent.trim();
      const map = await translateTexts([o]);
      if (map[o]) pre.textContent = map[o];
    }
    function syncTrButton() {
      const b = document.getElementById('trToggle');
      // Content translation targets Russian readers; hide the button in EN UI.
      b.style.display = lang === 'ru' ? '' : 'none';
      b.title = t('tr_btn_title');
      b.style.color = translateOn ? 'var(--blaze)' : 'var(--muted)';
      b.style.borderColor = translateOn ? 'var(--blaze)' : 'var(--line)';
    }

    // ---- Language & static chrome ----------------------------------------------------
    function renderChrome() {
      document.documentElement.lang = lang;
      document.title = t('doc_title');
      document.getElementById('langToggle').textContent = lang.toUpperCase();
      document.getElementById('liveWrap').title = t('live_title');
      const sel = document.getElementById('projectFilter');
      sel.setAttribute('aria-label', t('project_filter'));
      sel.options[0].textContent = t('all_projects');
      const dbPathEl = document.getElementById('dbPath');
      if (!dbPathEl.textContent) dbPathEl.textContent = t('tagline');
      syncTrButton();
    }

    // ---- Init ------------------------------------------------------------------------
    async function init() {
      renderChrome();
      renderNav();
      document.getElementById('langToggle').onclick = () => {
        lang = lang === 'ru' ? 'en' : 'ru';
        localStorage.setItem('dash_lang', lang);
        renderChrome();
        renderNav();
        route();
      };
      document.getElementById('trToggle').onclick = () => {
        if (!translateOn && !localStorage.getItem('dash_translate_ack')) {
          const ok = confirm(t('tr_confirm'));
          if (!ok) return;
          localStorage.setItem('dash_translate_ack', '1');
        }
        translateOn = !translateOn;
        localStorage.setItem('dash_translate', translateOn ? '1' : '0');
        syncTrButton();
        if (!translateOn) setStatus('');
        route();
      };
      try {
        const caps = await api('/api/capabilities');
        isAdmin = caps.admin;
        if (isAdmin) document.getElementById('adminBadge').classList.remove('hidden');
        document.getElementById('dbPath').textContent = caps.db_path;
      } catch {}
      try {
        const projects = await api('/api/projects');
        const sel = document.getElementById('projectFilter');
        for (const p of projects) sel.appendChild(el(`<option value="${esc(p.id)}">${esc(p.name)}</option>`));
        sel.onchange = () => { projectId = sel.value; route(); };
      } catch {}
      pollLive();
      route();
    }
    init();
  </script>
</body>
</html>
